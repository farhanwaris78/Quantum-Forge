name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Validate scripts and repository consistency
        run: |
          bash -n packaging/unix/*.sh packaging/build-portable.sh packaging/build-native.sh packaging/arch/build-package.sh
          git -c core.whitespace=cr-at-eol diff --check
          scripts/static_checks.py
          scripts/compile_check.py
          scripts/fixture_harness.py
      - name: Build, test, and generate SBOM
        run: mvn -B -ntp clean verify
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-java-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/quantumforge-sbom.json
          if-no-files-found: warn

  portable-smoke:
    name: Portable install/update command smoke
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build Linux portable archive
        run: packaging/build-portable.sh linux x64
      - name: Test CLI and unprivileged install/uninstall
        run: |
          VERSION="$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' pom.xml | head -1)"
          BUNDLE="$PWD/target/portable/QuantumForge-$VERSION-linux-x64"
          "$BUNDLE/bin/quantumforge" --version
          HOME="$RUNNER_TEMP/qf-home" "$BUNDLE/install.sh" --yes
          HOME="$RUNNER_TEMP/qf-home" "$RUNNER_TEMP/qf-home/.local/bin/quantumforge" --doctor
          HOME="$RUNNER_TEMP/qf-home" "$RUNNER_TEMP/qf-home/.local/bin/quantumforge" --uninstall --yes
          test ! -e "$RUNNER_TEMP/qf-home/.local/share/quantumforge"
      - name: Upload portable smoke archive
        uses: actions/upload-artifact@v5
        with:
          name: quantumforge-linux-x64-portable
          path: target/release/*.tar.gz
          if-no-files-found: error
