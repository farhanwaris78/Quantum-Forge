name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Validate scripts and repository consistency
        run: |
          bash -n packaging/unix/*.sh packaging/build-portable.sh packaging/build-native.sh packaging/arch/build-package.sh
          git -c core.whitespace=cr-at-eol diff --check
          scripts/static_checks.py
          scripts/compile_check.py
          scripts/fixture_harness.py
      - name: Build, test, and generate SBOM
        run: mvn -B -ntp clean verify 2>&1 | tee "$RUNNER_TEMP/maven-build.log"
      - name: Surface Maven errors as annotations
        if: always()
        run: |
          grep -E '^\[ERROR\]' "$RUNNER_TEMP/maven-build.log" | head -n 50 \
            | sed 's/\r$//; s/^/::error::/' || true
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/quantumforge-sbom.json
          if-no-files-found: warn
