name: Auto-release

# On every source change merged to master, bump the patch version, build native
# and portable assets on each target OS, publish SHA256SUMS, and create a
# GitHub Release. Installer artifacts are intentionally unsigned unless code
# signing secrets are added later.
on:
  push:
    branches: [master]
    paths-ignore:
      - '.github/workflows/**'
      - 'src/quantumforge/com/env/*.prop'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  prepare:
    name: Bump version and tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0
      - name: Bump patch version in all runtime declarations
        id: bump
        run: |
          set -euo pipefail
          CUR="$(python3 - <<'PY'
          import re
          from pathlib import Path

          files = [
              Path('pom.xml'),
              Path('src/quantumforge/ver/Version.java'),
              Path('src/quantumforge/com/env/Environments.unix.prop'),
              Path('src/quantumforge/com/env/Environments.win.prop'),
          ]
          patterns = [
              r'<version>([^<]+)</version>',
              r'VERSION\s*=\s*"([^"]+)"',
              r'(?m)^version\s*=\s*(\S+)',
              r'(?m)^version\s*=\s*(\S+)',
          ]
          values = []
          for path, pattern in zip(files, patterns):
              match = re.search(pattern, path.read_text(encoding='utf-8'))
              if not match:
                  raise SystemExit(f'Could not read version from {path}')
              values.append(match.group(1))
          if len(set(values)) != 1:
              raise SystemExit(f'Version declarations disagree before release: {values}')
          print(values[0])
          PY
          )"
          IFS='.' read -r MAJ MIN PAT <<< "$CUR"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          TAG="v$NEW"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Release tag $TAG already exists. Update the version manually before rerunning."
            exit 1
          fi
          python3 - "$CUR" "$NEW" <<'PY'
          import re
          import sys
          from pathlib import Path

          cur, new = sys.argv[1:3]
          replacements = {
              Path('pom.xml'): (f'<version>{cur}</version>', f'<version>{new}</version>'),
              Path('src/quantumforge/ver/Version.java'): (f'VERSION = "{cur}";', f'VERSION = "{new}";'),
          }
          for path, (old, replacement) in replacements.items():
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected {old!r} in {path}')
              path.write_text(text.replace(old, replacement, 1), encoding='utf-8')
          for path in [
              Path('src/quantumforge/com/env/Environments.unix.prop'),
              Path('src/quantumforge/com/env/Environments.win.prop'),
          ]:
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(r'(?m)^(version\s*=\s*)\S+', rf'\g<1>{new}', text, count=1)
              if count != 1:
                  raise SystemExit(f'Expected version property in {path}')
              path.write_text(updated, encoding='utf-8')
          PY
          scripts/static_checks.py
          echo "Bumping $CUR -> $NEW ($TAG)"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Commit version bump, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml src/quantumforge/ver/Version.java src/quantumforge/com/env/*.prop
          git commit -m "chore(release): $VERSION [skip release]"
          git tag "$TAG"
          git push origin HEAD:master "refs/tags/$TAG"

  linux:
    name: Linux portable tarball and Debian package
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Install Linux packaging prerequisites
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y fakeroot binutils
      - name: Build Linux x64 portable and native assets
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          packaging/build-portable.sh linux x64
          cp "target/release/QuantumForge-$VERSION-linux-x64.tar.gz" "$RUNNER_TEMP/portable.tar.gz"
          packaging/build-native.sh deb
          rm -rf target/release
          mkdir -p target/release
          cp "$RUNNER_TEMP/portable.tar.gz" "target/release/QuantumForge-$VERSION-linux-x64.tar.gz"
          DEB="$(find target/native -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "$DEB"
          cp "$DEB" "target/release/QuantumForge-$VERSION-linux-x64.deb"
          cp target/quantumforge.jar target/release/quantumforge.jar
          cp target/quantumforge-sbom.json target/release/quantumforge-sbom.json
      - uses: actions/upload-artifact@v5
        with:
          name: release-linux-x64
          path: target/release/*
          if-no-files-found: error

  windows:
    name: Windows portable ZIP and MSI
    needs: prepare
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build Windows x64 portable and native assets
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          .\packaging\build-portable.ps1 -Machine x64
          Copy-Item "target\release\QuantumForge-$env:VERSION-windows-x64.zip" "$env:RUNNER_TEMP\portable.zip"
          .\packaging\build-native.ps1 -Type msi
          Remove-Item "target\release" -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force "target\release" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\portable.zip" "target\release\QuantumForge-$env:VERSION-windows-x64.zip"
          $Msi = Get-ChildItem "target\native\*.msi" | Select-Object -First 1
          if (-not $Msi) { throw "jpackage did not produce MSI" }
          Copy-Item $Msi.FullName "target\release\QuantumForge-$env:VERSION-windows-x64.msi"
      - uses: actions/upload-artifact@v5
        with:
          name: release-windows-x64
          path: target/release/*
          if-no-files-found: error

  macos:
    name: macOS portable tarball, DMG, and PKG
    needs: prepare
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build macOS x64 portable and native assets
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          MACHINE: x64
        run: |
          set -euo pipefail
          packaging/build-portable.sh macos "$MACHINE"
          cp "target/release/QuantumForge-$VERSION-macos-$MACHINE.tar.gz" "$RUNNER_TEMP/portable.tar.gz"
          packaging/build-native.sh dmg
          DMG="$(find target/native -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$DMG"
          cp "$DMG" "$RUNNER_TEMP/native.dmg"
          packaging/build-native.sh pkg
          PKG="$(find target/native -maxdepth 1 -type f -name '*.pkg' -print -quit)"
          test -n "$PKG"
          rm -rf target/release
          mkdir -p target/release
          cp "$RUNNER_TEMP/portable.tar.gz" "target/release/QuantumForge-$VERSION-macos-$MACHINE.tar.gz"
          cp "$RUNNER_TEMP/native.dmg" "target/release/QuantumForge-$VERSION-macos-$MACHINE.dmg"
          cp "$PKG" "target/release/QuantumForge-$VERSION-macos-$MACHINE.pkg"
      - uses: actions/upload-artifact@v5
        with:
          name: release-macos-x64
          path: target/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release with SHA256SUMS
    needs: [prepare, linux, windows, macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate checksums and release notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -printf '%f\n' | sort
          (cd dist && sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | sort) > SHA256SUMS)
          cat > release-notes.md <<EOF_NOTES
          Automated release $VERSION.

          Assets include:
          - Linux x64 portable .tar.gz and native .deb
          - Windows x64 portable .zip and native .msi
          - macOS x64 portable .tar.gz plus native .dmg and .pkg
          - quantumforge.jar, quantumforge-sbom.json, and SHA256SUMS

          Installer and archive artifacts are unsigned because no code-signing secrets are configured.
          EOF_NOTES
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$TAG" \
              --notes-file release-notes.md
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: complete-release-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error
