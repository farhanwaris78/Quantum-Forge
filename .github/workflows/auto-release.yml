name: Auto-release

# On every change merged to master, bump the patch version, build, and
# publish a GitHub Release automatically.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    # Skip the version-bump commit this workflow pushes.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Bump patch version in pom.xml and Version.java
        id: v
        run: |
          CUR="$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' pom.xml | head -1)"
          IFS='.' read -r MAJ MIN PAT <<< "$CUR"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          sed -i "s:<version>$CUR</version>:<version>$NEW</version>:" pom.xml
          sed -i "s:VERSION = \"$CUR\";:VERSION = \"$NEW\";:" src/quantumforge/ver/Version.java
          echo "Bumping $CUR -> $NEW (tag v$NEW)"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Build (compile + tests + SBOM)
        run: mvn -B -ntp clean verify

      - name: Build Linux x64 portable archive
        continue-on-error: true
        run: packaging/build-portable.sh linux x64

      - name: Commit version bump, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml src/quantumforge/ver/Version.java
          git commit -m "chore(release): ${{ steps.v.outputs.version }} [skip release]"
          git tag "${{ steps.v.outputs.tag }}"
          git push origin master --tags

      - name: Publish GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ASSETS=(target/quantumforge.jar target/quantumforge-sbom.json)
          PORTABLE="$(find target/release -maxdepth 1 -name '*.tar.gz' -print -quit 2>/dev/null || true)"
          if [ -n "$PORTABLE" ]; then ASSETS+=("$PORTABLE"); fi
          gh release create "${{ steps.v.outputs.tag }}" \
            --title "${{ steps.v.outputs.tag }}" \
            --notes "Automated release ${{ steps.v.outputs.version }} from ${GITHUB_SHA::7}." \
            "${ASSETS[@]}"
